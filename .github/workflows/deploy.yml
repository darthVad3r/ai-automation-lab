name: Deploy

on:
  push:
    branches:
      - dev
      - qa
      - uat
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}

    defaults:
      run:
        working-directory: ai-automation-landing

    env:
      BUILD_CONFIG: ${{ vars.BUILD_CONFIG }}
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          RESOLVED_BUILD_CONFIG="${BUILD_CONFIG}"

          # If BUILD_CONFIG is not set, fall back to branch name
          if [ -z "${RESOLVED_BUILD_CONFIG}" ]; then
            RESOLVED_BUILD_CONFIG="${BRANCH_NAME}"
          fi

          # Normalize aliases from both branches' logic
          case "${RESOLVED_BUILD_CONFIG}" in
            main|qa|uat|production)
              RESOLVED_BUILD_CONFIG="production"
              ;;
            dev|development)
              RESOLVED_BUILD_CONFIG="development"
              ;;
          esac

          # Validate final config
          if [ "${RESOLVED_BUILD_CONFIG}" != "production" ] && [ "${RESOLVED_BUILD_CONFIG}" != "development" ]; then
            echo "Unsupported BUILD_CONFIG '${RESOLVED_BUILD_CONFIG}'. Expected one of: main, qa, uat, dev, production, development."
            exit 1
          fi

          echo "Using Angular build configuration: ${RESOLVED_BUILD_CONFIG}"
          npm run build -- --configuration=${RESOLVED_BUILD_CONFIG}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-automation-landing/dist/ai-automation-landing/browser

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref_name }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
