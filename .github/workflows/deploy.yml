name: Deploy

on:
  push:
    branches:
      - dev
      - qa
      - uat
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
    defaults:
      run:
        working-directory: ai-automation-landing
    env:
      BUILD_CONFIG: ${{ vars.BUILD_CONFIG }}
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: |
          RESOLVED_BUILD_CONFIG="${BUILD_CONFIG}"

          if [ -z "${RESOLVED_BUILD_CONFIG}" ]; then
            if [ "${BRANCH_NAME}" = "main" ]; then
              RESOLVED_BUILD_CONFIG="production"
            else
              RESOLVED_BUILD_CONFIG="development"
            fi
          fi

          case "${RESOLVED_BUILD_CONFIG}" in
            dev)
              RESOLVED_BUILD_CONFIG="development"
              ;;
            qa|uat)
              RESOLVED_BUILD_CONFIG="production"
              ;;
          esac

          if [ "${RESOLVED_BUILD_CONFIG}" != "production" ] && [ "${RESOLVED_BUILD_CONFIG}" != "development" ]; then
            echo "Unsupported BUILD_CONFIG '${RESOLVED_BUILD_CONFIG}'. Expected one of: production, development, dev, qa, uat."
            exit 1
          fi

          echo "Using Angular build configuration: ${RESOLVED_BUILD_CONFIG}"
          npm run build -- --configuration=${RESOLVED_BUILD_CONFIG}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-automation-landing/dist/ai-automation-landing/browser

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4

environment:
  name: ${{ github.ref_name }}
