name: Deploy

on:
  push:
    branches:
      - dev
      - qa
      - uat
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
    defaults:
      run:
        working-directory: ai-automation-landing
    env:
      BUILD_CONFIG: ${{ vars.BUILD_CONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=${BUILD_CONFIG}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-automation-landing/dist/ai-automation-landing/browser

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref_name }}

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
