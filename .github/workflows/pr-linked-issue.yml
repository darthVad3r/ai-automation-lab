name: PR Linked Issue Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Validate linked issue keywords
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || '').toLowerCase();
            const linkPattern = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/;

            if (!linkPattern.test(body)) {
              core.setFailed(
                'PR body must link an issue with a closing keyword, e.g. "Closes #57".'
              );
            }
