name: CI

on:
  push:
  pull_request:
    branches: ["main"]

defaults:
  run:
    working-directory: ai-automation-landing

jobs:
  install:
    name: Install & Cache Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ai-automation-landing/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules-install
        uses: actions/cache@v4
        with:
          path: ai-automation-landing/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('ai-automation-landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        if: steps.cache-node-modules-install.outputs.cache-hit != 'true'
        run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        id: cache-node-modules-lint
        uses: actions/cache@v4
        with:
          path: ai-automation-landing/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('ai-automation-landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - if: steps.cache-node-modules-lint.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        id: cache-node-modules-typecheck
        uses: actions/cache@v4
        with:
          path: ai-automation-landing/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('ai-automation-landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - if: steps.cache-node-modules-typecheck.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        id: cache-node-modules-test
        uses: actions/cache@v4
        with:
          path: ai-automation-landing/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('ai-automation-landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - if: steps.cache-node-modules-test.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm test -- --coverage
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ai-automation-landing/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        id: cache-node-modules-build
        uses: actions/cache@v4
        with:
          path: ai-automation-landing/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('ai-automation-landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - if: steps.cache-node-modules-build.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ai-automation-landing/dist
