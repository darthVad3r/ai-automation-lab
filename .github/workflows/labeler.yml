name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'frontend', color: '1D76DB', description: 'Frontend application changes' },
              { name: 'workflows', color: '5319E7', description: 'GitHub workflow and automation changes' },
              { name: 'documentation', color: '0E8A16', description: 'Documentation-only updates' },
              { name: 'feature', color: 'A2EEEF', description: 'Feature branch pull request' },
              { name: 'fix', color: 'D93F0B', description: 'Bug fix branch pull request' },
              { name: 'chore', color: 'FBCA04', description: 'Chore or maintenance branch pull request' },
              { name: 'needs-review', color: 'BFD4F2', description: 'Ready for reviewer attention' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
