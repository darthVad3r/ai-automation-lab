name: Project Automation

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  add-to-project:
    if: vars.GH_PROJECT_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Validate project automation secret
        env:
          ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
        run: |
          if [ -z "$ADD_TO_PROJECT_PAT" ]; then
            echo "ADD_TO_PROJECT_PAT is required for project automation."
            exit 1
          fi

      - name: Add issue/PR to GitHub Project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.GH_PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
