name: Sync Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply branch protection for main
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "REPO_ADMIN_TOKEN is required to update branch protection."
            exit 1
          fi

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/branches/main/protection" \
            --input .github/branch-protection-main.json
