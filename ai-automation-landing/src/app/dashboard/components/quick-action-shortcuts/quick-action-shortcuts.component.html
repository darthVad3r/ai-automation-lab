<section class="quick-actions surface-card" aria-labelledby="quick-actions-title">
  <header class="quick-actions__header">
    <h2 id="quick-actions-title">{{ sectionTitle }}</h2>
    <p>Launch frequently used dashboard actions without leaving this workspace.</p>
  </header>

  <ul class="quick-actions__grid" aria-label="Quick action shortcuts">
    @for (shortcut of shortcuts; track shortcut.id) {
      <li>
        <button
          class="quick-actions__shortcut"
          type="button"
          [attr.aria-labelledby]="shortcutLabelledBy(shortcut)"
          (click)="activateShortcut(shortcut)"
        >
          <span class="quick-actions__icon" aria-hidden="true">{{ iconGlyph(shortcut) }}</span>
          <span class="quick-actions__content">
            <span class="quick-actions__title" [id]="shortcutTitleId(shortcut)">{{
              shortcut.title
            }}</span>
            @if (shortcut.description) {
              <span class="quick-actions__description" [id]="shortcutDescriptionId(shortcut)">
                {{ shortcut.description }}
              </span>
            }
          </span>
        </button>
      </li>
    }
  </ul>
</section>
