<div class="ui-select">
  <label class="ui-select__label" [for]="id()">
    {{ label() }}
    @if (required()) {
      <span aria-hidden="true">*</span>
    }
  </label>

  <div class="ui-select__control-wrap">
    <select
      class="ui-select__control"
      [id]="id()"
      [value]="value()"
      [required]="required()"
      [disabled]="disabled()"
      [attr.aria-required]="required()"
      [attr.aria-invalid]="error() ? 'true' : null"
      [attr.aria-describedby]="describedBy()"
      (change)="onSelect($event)"
    >
      <option value="" [disabled]="required()">{{ placeholder() }}</option>

      @for (option of options(); track option.value) {
        <option [value]="option.value" [disabled]="option.disabled ?? false">
          {{ option.label }}
        </option>
      }
    </select>
    <span class="ui-select__icon" aria-hidden="true">▾</span>
  </div>

  @if (hint()) {
    <p class="ui-select__hint" [id]="id() + '-hint'">{{ hint() }}</p>
  }

  @if (error()) {
    <p class="ui-select__error" [id]="id() + '-error'">{{ error() }}</p>
  }
</div>
