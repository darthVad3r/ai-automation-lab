@if (open()) {
  <div class="ui-dialog__backdrop" (click)="closeFromBackdrop()">
    <section
      #dialogPanel
      class="ui-dialog"
      tabindex="-1"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      [attr.aria-describedby]="description() ? descriptionId : null"
      (click)="$event.stopPropagation()"
    >
      <header class="ui-dialog__header">
        <h2 [id]="titleId" class="ui-dialog__title">{{ title() }}</h2>
        <button
          class="ui-dialog__close"
          type="button"
          aria-label="Close dialog"
          (click)="closeFromButton()"
        >
          ✕
        </button>
      </header>

      @if (description()) {
        <p [id]="descriptionId" class="ui-dialog__description">{{ description() }}</p>
      }

      <div class="ui-dialog__content">
        <ng-content></ng-content>
      </div>
    </section>
  </div>
}
