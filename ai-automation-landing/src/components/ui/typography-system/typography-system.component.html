@switch (variant()) {
  @case ('display') {
    <p class="ui-type ui-type--display">{{ text() }}</p>
  }
  @case ('h1') {
    <h1 class="ui-type ui-type--h1">{{ text() }}</h1>
  }
  @case ('h2') {
    <h2 class="ui-type ui-type--h2">{{ text() }}</h2>
  }
  @case ('h3') {
    <h3 class="ui-type ui-type--h3">{{ text() }}</h3>
  }
  @case ('body-sm') {
    <p class="ui-type ui-type--body-sm">{{ text() }}</p>
  }
  @case ('label') {
    <p class="ui-type ui-type--label">{{ text() }}</p>
  }
  @case ('caption') {
    <p class="ui-type ui-type--caption">{{ text() }}</p>
  }
  @default {
    <p class="ui-type ui-type--body">{{ text() }}</p>
  }
}
